name: battleship

services:
  db:
    image: postgres:16-alpine
    container_name: battleship-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: battleship
      POSTGRES_USER: battleship
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - battleship_postgres_data:/var/lib/postgresql/data
    networks:
      - battleship
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U battleship -d battleship"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  backend:
    image: ${BACKEND_IMAGE}
    container_name: battleship-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://battleship-db:5432/battleship"
      SPRING_DATASOURCE_USERNAME: battleship
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_H2_CONSOLE_ENABLED: "false"
      APP_ALLOWED_ORIGIN_PATTERNS: "http://battleship.nightly.mx,http://battleship.nightly.mx:3006,https://battleship.nightly.mx,http://40.233.30.181:3006,http://localhost:3006,http://localhost:3000,http://localhost:3001,http://localhost:3002"
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0"
    ports:
      - "127.0.0.1:3007:8080"
    networks:
      - battleship

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: battleship-frontend
    restart: unless-stopped
    environment:
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
    networks:
      - battleship

  nginx:
    image: nginx:1.27-alpine
    container_name: battleship-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "0.0.0.0:3006:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - battleship

networks:
  battleship:
    name: battleship

volumes:
  battleship_postgres_data:
    name: battleship_postgres_data
