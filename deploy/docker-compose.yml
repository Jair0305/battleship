name: battleship

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: battleship-db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Express
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    volumes:
      - battleship_mssql_data:/var/opt/mssql
    networks:
      - battleship
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/1433'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  db-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: battleship-db-init
    depends_on:
      db:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    volumes:
      - ./mssql-init.sh:/mssql-init.sh:ro
    networks:
      - battleship
    entrypoint: ["/bin/bash", "/mssql-init.sh"]
    restart: "no"

  backend:
    image: ${BACKEND_IMAGE}
    container_name: battleship-backend
    restart: unless-stopped
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: "jdbc:sqlserver://battleship-db:1433;databaseName=battleship;encrypt=true;trustServerCertificate=true;loginTimeout=30;"
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ${MSSQL_SA_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.microsoft.sqlserver.jdbc.SQLServerDriver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.SQLServerDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_H2_CONSOLE_ENABLED: "false"
      APP_ALLOWED_ORIGIN_PATTERNS: "http://battleship.nightly.mx,http://battleship.nightly.mx:3006,https://battleship.nightly.mx,http://40.233.30.181:3006,http://localhost:3006,http://localhost:3000,http://localhost:3001,http://localhost:3002"
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0"
    ports:
      - "127.0.0.1:3007:8080"
    networks:
      - battleship

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: battleship-frontend
    restart: unless-stopped
    environment:
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
    networks:
      - battleship

  nginx:
    image: nginx:1.27-alpine
    container_name: battleship-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "0.0.0.0:3006:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - battleship

networks:
  battleship:
    name: battleship

volumes:
  battleship_mssql_data:
    name: battleship_mssql_data
